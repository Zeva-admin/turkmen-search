{% extends "base.html" %}
{% block title %}Компании{% endblock %}
{% block nav_companies %}active{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Компании</h1>
                <p class="page-subtitle" id="companiesCountText">Загрузка...</p>
            </div>
        </div>

        <!-- Search & Filters Bar -->
        <div class="companies-filter-bar">
            <div class="companies-search">
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="form-input" id="companySearch" placeholder="Название компании...">
                </div>
            </div>
            <div class="companies-filters">
                <select class="form-select" id="companyCity">
                    <option value="">Все города</option>
                    <option value="Ашхабад">Ашхабад</option>
                    <option value="Туркменабат">Туркменабат</option>
                    <option value="Дашогуз">Дашогуз</option>
                    <option value="Мары">Мары</option>
                    <option value="Балканабат">Балканабат</option>
                    <option value="Туркменбаши">Туркменбаши</option>
                </select>
                <select class="form-select" id="companyType">
                    <option value="">Все типы</option>
                    <option value="government">Государственная</option>
                    <option value="private">Частная</option>
                    <option value="foreign">Иностранная</option>
                    <option value="startup">Стартап</option>
                </select>
                <select class="form-select" id="companySort">
                    <option value="name">По названию</option>
                    <option value="jobs">По вакансиям</option>
                    <option value="rating">По рейтингу</option>
                </select>
            </div>
        </div>

        <!-- Companies Grid -->
        <div class="companies-page-grid" id="companiesPageGrid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Загрузка компаний...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="companiesPagination"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let isLoading = false;
const filters = { q: '', city: '', type: '', sort: 'name' };

document.addEventListener('DOMContentLoaded', () => {
    loadCompanies();
    setupListeners();
});

function setupListeners() {
    let searchTimer;
    document.getElementById('companySearch').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            filters.q = e.target.value.trim();
            currentPage = 1;
            loadCompanies();
        }, 400);
    });

    document.getElementById('companyCity').addEventListener('change', (e) => {
        filters.city = e.target.value;
        currentPage = 1;
        loadCompanies();
    });

    document.getElementById('companyType').addEventListener('change', (e) => {
        filters.type = e.target.value;
        currentPage = 1;
        loadCompanies();
    });

    document.getElementById('companySort').addEventListener('change', (e) => {
        filters.sort = e.target.value;
        currentPage = 1;
        loadCompanies();
    });
}

async function loadCompanies() {
    if (isLoading) return;
    isLoading = true;

    const grid = document.getElementById('companiesPageGrid');
    grid.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Загрузка...</p></div>`;

    try {
        let url = `/api/companies?page=${currentPage}&per_page=16&sort=${filters.sort}`;
        if (filters.q) url += `&q=${encodeURIComponent(filters.q)}`;
        if (filters.city) url += `&city=${encodeURIComponent(filters.city)}`;
        if (filters.type) url += `&type=${encodeURIComponent(filters.type)}`;

        const data = await API.get(url);

        document.getElementById('companiesCountText').textContent =
            `Найдено ${data.total} ${pluralize(data.total, 'компания', 'компании', 'компаний')}`;

        if (!data.companies || data.companies.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <h3>Компании не найдены</h3>
                    <p>Попробуйте изменить параметры поиска</p>
                </div>`;
            document.getElementById('companiesPagination').innerHTML = '';
            return;
        }

        grid.innerHTML = data.companies.map(c => renderCompanyCardFull(c)).join('');
        renderCompaniesPagination(data.pages, data.current_page);

    } catch(e) {
        grid.innerHTML = `<div class="error-state"><p>Ошибка загрузки. <button class="btn-text" onclick="loadCompanies()">Повторить</button></p></div>`;
    } finally {
        isLoading = false;
    }
}

function renderCompanyCardFull(company) {
    return `
        <a href="/companies/${company.id}" class="company-full-card">
            <div class="company-full-card-top">
                <div class="company-full-logo">
                    ${company.logo
                        ? `<img src="/uploads/logos/${company.logo}" alt="${company.name}" class="company-logo-img">`
                        : `<div class="company-logo-placeholder">${company.name[0]}</div>`}
                </div>
                <div class="company-full-badges">
                    ${company.is_verified ? `<span class="verified-chip">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01" stroke="white" stroke-width="2.5" fill="none"/></svg>
                        Верифицирована
                    </span>` : ''}
                </div>
            </div>
            <div class="company-full-info">
                <h3 class="company-full-name">${company.name}</h3>
                ${company.industry ? `<p class="company-full-industry">${company.industry}</p>` : ''}
                ${company.short_description ? `<p class="company-full-desc">${company.short_description}</p>` : ''}
            </div>
            <div class="company-full-footer">
                ${company.city ? `
                <span class="company-full-meta">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    ${company.city}
                </span>` : ''}
                ${company.employees_count ? `
                <span class="company-full-meta">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    ${company.employees_display}
                </span>` : ''}
                <span class="company-jobs-count">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    ${company.active_jobs} ${pluralize(company.active_jobs, 'вакансия', 'вакансии', 'вакансий')}
                </span>
            </div>
        </a>`;
}

function renderCompaniesPagination(totalPages, page) {
    const pag = document.getElementById('companiesPagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    let html = '';
    if (page > 1) html += `<button class="page-btn" onclick="goToPage(${page-1})">← Назад</button>`;
    for (let i = Math.max(1, page-2); i <= Math.min(totalPages, page+2); i++) {
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    if (page < totalPages) html += `<button class="page-btn" onclick="goToPage(${page+1})">Вперёд →</button>`;
    pag.innerHTML = html;
}
function goToPage(page) {
    currentPage = page;
    loadCompanies();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
{% endblock %}
