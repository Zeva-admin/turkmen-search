{% extends "base.html" %}
{% block title %}Личный кабинет{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="container">
        <div class="dashboard-layout">

            <!-- SIDEBAR -->
            <aside class="dashboard-sidebar">
                <div class="dashboard-profile-card">
                    <div class="dashboard-avatar" id="dashAvatar">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="dashboard-profile-info">
                        <h3 class="dashboard-profile-name" id="dashName">Загрузка...</h3>
                        <span class="dashboard-profile-role" id="dashRole"></span>
                    </div>
                </div>

                <nav class="dashboard-nav">
                    <a href="#overview" class="dashboard-nav-link active" data-section="overview">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        Обзор
                    </a>
                    <a href="#applications" class="dashboard-nav-link" data-section="applications" id="navApplications">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span id="navAppsLabel">Мои отклики</span>
                        <span class="nav-badge hidden" id="appsBadge"></span>
                    </a>
                    <a href="#resumes" class="dashboard-nav-link" data-section="resumes" id="navResumesLink">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Мои резюме
                    </a>
                    <a href="#jobs" class="dashboard-nav-link hidden" data-section="jobs" id="navJobsLink">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        Мои вакансии
                    </a>
                    <a href="#company" class="dashboard-nav-link hidden" data-section="company" id="navCompanyLink">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        Моя компания
                    </a>
                    <a href="/messages" class="dashboard-nav-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Сообщения
                    </a>
                    <a href="/notifications" class="dashboard-nav-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        Уведомления
                    </a>
                    <a href="/settings" class="dashboard-nav-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
                        Настройки
                    </a>
                </nav>
            </aside>

            <!-- MAIN CONTENT -->
            <div class="dashboard-main" id="dashboardMain">
                <div class="loading-state">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentUser = null;
let currentSection = 'overview';

document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.isLoggedIn()) {
        window.location.href = '/login?redirect=/dashboard';
        return;
    }
    await loadDashboard();
    setupNavigation();

    const hash = window.location.hash.replace('#', '') || 'overview';
    showSection(hash);
});

async function loadDashboard() {
    try {
        const data = await API.get('/api/auth/me', true);
        currentUser = data.user;

        document.getElementById('dashName').textContent = currentUser.name;
        document.getElementById('dashRole').textContent =
            currentUser.role === 'employer' ? 'Работодатель' :
            currentUser.role === 'admin' ? 'Администратор' : 'Соискатель';

        if (currentUser.avatar) {
            document.getElementById('dashAvatar').innerHTML =
                `<img src="/uploads/avatars/${currentUser.avatar}" alt="${currentUser.name}" class="avatar-img">`;
        }

        if (currentUser.role === 'employer' || currentUser.role === 'admin') {
            document.getElementById('navJobsLink').classList.remove('hidden');
            document.getElementById('navCompanyLink').classList.remove('hidden');
            document.getElementById('navAppsLabel').textContent = 'Отклики на вакансии';
        }

    } catch(e) {
        Auth.logout();
        window.location.href = '/login';
    }
}

function setupNavigation() {
    document.querySelectorAll('.dashboard-nav-link[data-section]').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const section = link.dataset.section;
            showSection(section);
            history.pushState(null, null, `#${section}`);
        });
    });
}

function showSection(section) {
    currentSection = section;
    document.querySelectorAll('.dashboard-nav-link').forEach(l => l.classList.remove('active'));
    document.querySelector(`[data-section="${section}"]`)?.classList.add('active');

    switch(section) {
        case 'overview': renderOverview(); break;
        case 'applications': renderApplications(); break;
        case 'resumes': renderResumes(); break;
        case 'jobs': renderEmployerJobs(); break;
        case 'company': renderCompany(); break;
    }
}

async function renderOverview() {
    const main = document.getElementById('dashboardMain');
    const isEmployer = currentUser.role === 'employer' || currentUser.role === 'admin';

    main.innerHTML = `
        <div class="dashboard-section">
            <div class="dashboard-section-header">
                <h2 class="dashboard-section-title">Добро пожаловать, ${currentUser.name.split(' ')[0]}!</h2>
            </div>

            <div class="dashboard-stats-grid" id="dashStatsGrid">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>

            <div class="dashboard-quick-actions">
                <h3 class="dashboard-subsection-title">Быстрые действия</h3>
                <div class="quick-actions-grid">
                    ${isEmployer ? `
                        <a href="/create-job" class="quick-action-card">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
                            <span>Разместить вакансию</span>
                        </a>
                        <a href="/resumes" class="quick-action-card">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                            <span>База резюме</span>
                        </a>
                        <button class="quick-action-card" onclick="showSection('applications')">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                            <span>Отклики</span>
                        </button>
                        <a href="/messages" class="quick-action-card">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
                            <span>Сообщения</span>
                        </a>
                    ` : `
                        <a href="/jobs" class="quick-action-card">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
                            <span>Найти вакансию</span>
                        </a>
                        <a href="/create-resume" class="quick-action-card">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                            <span>Создать резюме</span>
                        </a>
                        <button class="quick-action-card" onclick="showSection('applications')">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>
                            <span>Мои отклики</span>
                        </button>
                        <a href="/messages" class="quick-action-card">
                            <div class="qa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
                            <span>Сообщения</span>
                        </a>
                    `}
                </div>
            </div>
        </div>`;

    await loadDashboardStats();
}

async function loadDashboardStats() {
    const grid = document.getElementById('dashStatsGrid');
    const isEmployer = currentUser.role === 'employer' || currentUser.role === 'admin';

    try {
        if (isEmployer) {
            const [jobsData, appsData] = await Promise.all([
                API.get('/api/jobs/employer/my-jobs', true),
                API.get('/api/applications/employer/all', true),
            ]);

            grid.innerHTML = `
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num">${jobsData.total || 0}</span>
                        <span class="dash-stat-label">Вакансий размещено</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num">${appsData.total || 0}</span>
                        <span class="dash-stat-label">Откликов получено</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num">${appsData.applications?.filter(a => a.status === 'pending').length || 0}</span>
                        <span class="dash-stat-label">Новых откликов</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num" id="unreadMsgCount">—</span>
                        <span class="dash-stat-label">Непрочитанных сообщений</span>
                    </div>
                </div>`;
        } else {
            const [appsData, resumesData] = await Promise.all([
                API.get('/api/applications/my', true),
                API.get('/api/resumes/my', true),
            ]);

            grid.innerHTML = `
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num">${appsData.total || 0}</span>
                        <span class="dash-stat-label">Откликов отправлено</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num">${resumesData.total || 0}</span>
                        <span class="dash-stat-label">Резюме создано</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num">${appsData.applications?.filter(a => a.status === 'invited').length || 0}</span>
                        <span class="dash-stat-label">Приглашений</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon dash-stat-purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-num" id="unreadMsgCount">—</span>
                        <span class="dash-stat-label">Непрочитанных сообщений</span>
                    </div>
                </div>`;
        }

        // Load unread messages
        try {
            const msgData = await API.get('/api/messages/unread-count', true);
            document.getElementById('unreadMsgCount').textContent = msgData.unread_count;
        } catch(e) {}

    } catch(e) {
        grid.innerHTML = '<p class="error-text">Ошибка загрузки статистики</p>';
    }
}

async function renderApplications() {
    const main = document.getElementById('dashboardMain');
    const isEmployer = currentUser.role === 'employer' || currentUser.role === 'admin';

    main.innerHTML = `
        <div class="dashboard-section">
            <div class="dashboard-section-header">
                <h2 class="dashboard-section-title">${isEmployer ? 'Отклики на вакансии' : 'Мои отклики'}</h2>
                <div class="section-header-filters">
                    <select class="form-select form-select-sm" id="appStatusFilter">
                        <option value="">Все статусы</option>
                        <option value="pending">На рассмотрении</option>
                        <option value="viewed">Просмотрено</option>
                        <option value="invited">Приглашение</option>
                        <option value="rejected">Отказ</option>
                        <option value="accepted">Принято</option>
                    </select>
                </div>
            </div>
            <div id="applicationsList"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>`;

    document.getElementById('appStatusFilter').addEventListener('change', (e) => {
        loadApplicationsList(e.target.value);
    });

    await loadApplicationsList();
}

async function loadApplicationsList(status = '') {
    const list = document.getElementById('applicationsList');
    const isEmployer = currentUser.role === 'employer' || currentUser.role === 'admin';

    try {
        let url = isEmployer
            ? `/api/applications/employer/all?status=${status}`
            : `/api/applications/my?status=${status}`;

        const data = await API.get(url, true);

        if (!data.applications || data.applications.length === 0) {
            list.innerHTML = `<div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <p>Откликов пока нет</p>
            </div>`;
            return;
        }

        list.innerHTML = data.applications.map(app => `
            <div class="application-card">
                <div class="application-card-left">
                    <div class="application-job-info">
                        <a href="/jobs/${app.job_id}" class="application-job-title">${app.job?.title || 'Вакансия'}</a>
                        <span class="application-company">${app.job?.company?.name || ''}</span>
                        ${isEmployer && app.user ? `<span class="application-candidate">Кандидат: <strong>${app.user.name}</strong></span>` : ''}
                    </div>
                    <div class="application-meta">
                        <span class="application-date">${formatDate(app.created_at)}</span>
                        ${app.job?.city ? `<span class="application-city">${app.job.city}</span>` : ''}
                    </div>
                </div>
                <div class="application-card-right">
                    <span class="status-badge status-${app.status}">${app.status_display}</span>
                    ${isEmployer ? `
                        <div class="application-actions">
                            <button class="btn btn-sm btn-success" onclick="updateAppStatus(${app.id}, 'invited')">Пригласить</button>
                            <button class="btn btn-sm btn-danger" onclick="updateAppStatus(${app.id}, 'rejected')">Отказать</button>
                        </div>` : ''}
                    ${app.resume ? `<a href="/resumes/${app.resume.id}" class="btn btn-sm btn-ghost">Резюме</a>` : ''}
                </div>
            </div>
        `).join('');

    } catch(e) {
        list.innerHTML = '<p class="error-text">Ошибка загрузки откликов</p>';
    }
}

async function updateAppStatus(appId, status) {
    try {
        await API.put(`/api/applications/${appId}/status`, { status }, true);
        showToast('Статус обновлён', 'success');
        loadApplicationsList(document.getElementById('appStatusFilter').value);
    } catch(e) {
        showToast(e.message || 'Ошибка обновления статуса', 'error');
    }
}

async function renderResumes() {
    const main = document.getElementById('dashboardMain');
    main.innerHTML = `
        <div class="dashboard-section">
            <div class="dashboard-section-header">
                <h2 class="dashboard-section-title">Мои резюме</h2>
                <a href="/create-resume" class="btn btn-primary btn-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Создать резюме
                </a>
            </div>
            <div id="resumesList"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>`;

    try {
        const data = await API.get('/api/resumes/my', true);
        const list = document.getElementById('resumesList');

        if (!data.resumes || data.resumes.length === 0) {
            list.innerHTML = `<div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                <p>У вас пока нет резюме</p>
                <a href="/create-resume" class="btn btn-primary">Создать резюме</a>
            </div>`;
            return;
        }

        list.innerHTML = data.resumes.map(r => `
            <div class="resume-list-card">
                <div class="resume-list-info">
                    <h3 class="resume-list-title"><a href="/resumes/${r.id}">${r.title}</a></h3>
                    <p class="resume-list-position">${r.desired_position || ''}</p>
                    <div class="resume-list-meta">
                        <span>${r.city || ''}</span>
                        <span>${r.salary}</span>
                        <span>Обновлено: ${formatDate(r.updated_at)}</span>
                        <span class="status-badge ${r.is_public ? 'status-invited' : 'status-rejected'}">${r.is_public ? 'Открытое' : 'Скрытое'}</span>
                    </div>
                </div>
                <div class="resume-list-actions">
                    <span class="views-count">${r.views_count} просмотров</span>
                    <a href="/resumes/${r.id}" class="btn btn-ghost btn-sm">Просмотр</a>
                    <button class="btn btn-primary btn-sm" onclick="editResume(${r.id})">Редактировать</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteResume(${r.id})">Удалить</button>
                </div>
            </div>
        `).join('');

    } catch(e) {
        document.getElementById('resumesList').innerHTML = '<p class="error-text">Ошибка загрузки резюме</p>';
    }
}

async function deleteResume(id) {
    if (!confirm('Удалить резюме?')) return;
    try {
        await API.delete(`/api/resumes/${id}`, true);
        showToast('Резюме удалено', 'success');
        renderResumes();
    } catch(e) {
        showToast('Ошибка удаления', 'error');
    }
}

function editResume(id) {
    window.location.href = `/create-resume?edit=${id}`;
}

async function renderEmployerJobs() {
    const main = document.getElementById('dashboardMain');
    main.innerHTML = `
        <div class="dashboard-section">
            <div class="dashboard-section-header">
                <h2 class="dashboard-section-title">Мои вакансии</h2>
                <a href="/create-job" class="btn btn-primary btn-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Разместить вакансию
                </a>
            </div>
            <div id="employerJobsList"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>`;

    try {
        const data = await API.get('/api/jobs/employer/my-jobs', true);
        const list = document.getElementById('employerJobsList');

        if (!data.jobs || data.jobs.length === 0) {
            list.innerHTML = `<div class="empty-state">
                <p>Вы ещё не разместили вакансий</p>
                <a href="/create-job" class="btn btn-primary">Разместить вакансию</a>
            </div>`;
            return;
        }

        list.innerHTML = data.jobs.map(job => `
            <div class="employer-job-card">
                <div class="employer-job-info">
                    <h3 class="employer-job-title"><a href="/jobs/${job.id}">${job.title}</a></h3>
                    <div class="employer-job-meta">
                        <span>${job.city}</span>
                        <span>${job.salary}</span>
                        <span>${job.applications_count} откликов</span>
                        <span>${job.views_count} просмотров</span>
                        <span class="status-badge ${job.is_active ? 'status-invited' : 'status-rejected'}">${job.is_active ? 'Активна' : 'Неактивна'}</span>
                        ${job.is_hot ? '<span class="badge badge-hot">🔥 Горячая</span>' : ''}
                    </div>
                </div>
                <div class="employer-job-actions">
                    <a href="/jobs/${job.id}" class="btn btn-ghost btn-sm">Просмотр</a>
                    <button class="btn btn-primary btn-sm" onclick="editJob(${job.id})">Редактировать</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteJob(${job.id})">Удалить</button>
                </div>
            </div>
        `).join('');
    } catch(e) {
        document.getElementById('employerJobsList').innerHTML = '<p class="error-text">Ошибка загрузки</p>';
    }
}

async function deleteJob(id) {
    if (!confirm('Удалить вакансию?')) return;
    try {
        await API.delete(`/api/jobs/${id}`, true);
        showToast('Вакансия удалена', 'success');
        renderEmployerJobs();
    } catch(e) {
        showToast('Ошибка удаления', 'error');
    }
}

function editJob(id) {
    window.location.href = `/create-job?edit=${id}`;
}

async function renderCompany() {
    const main = document.getElementById('dashboardMain');
    main.innerHTML = `<div class="loading-state"><div class="spinner"></div></div>`;

    try {
        const data = await API.get('/api/companies/my', true);

        if (!data.company) {
            main.innerHTML = `
                <div class="dashboard-section">
                    <div class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                        <h3>У вас нет компании</h3>
                        <p>Создайте профиль компании, чтобы размещать вакансии</p>
                        <button class="btn btn-primary" onclick="showCreateCompanyForm()">Создать компанию</button>
                    </div>
                </div>`;
            return;
        }

        const c = data.company;
        main.innerHTML = `
            <div class="dashboard-section">
                <div class="dashboard-section-header">
                    <h2 class="dashboard-section-title">Моя компания</h2>
                    <a href="/companies/${c.id}" class="btn btn-ghost btn-sm">Страница компании</a>
                </div>
                <div class="company-profile-card">
                    <div class="company-profile-header">
                        <div class="company-profile-logo">
                            ${c.logo ? `<img src="/uploads/logos/${c.logo}" alt="${c.name}">` : `<div class="company-logo-placeholder-lg">${c.name[0]}</div>`}
                        </div>
                        <div class="company-profile-info">
                            <h3>${c.name} ${c.is_verified ? '<span class="verified-badge">✓ Верифицирована</span>' : ''}</h3>
                            <p>${c.industry || ''}</p>
                            <p>${c.city || ''} · ${c.type_display}</p>
                            <p>${c.employees_display}</p>
                        </div>
                    </div>
                    ${c.short_description ? `<p class="company-profile-desc">${c.short_description}</p>` : ''}
                    <div class="company-profile-stats">
                        <div class="cp-stat"><span>${c.active_jobs}</span><span>Вакансий</span></div>
                    </div>
                </div>
            </div>`;
    } catch(e) {
        main.innerHTML = '<p class="error-text">Ошибка загрузки данных компании</p>';
    }
}
</script>
{% endblock %}
