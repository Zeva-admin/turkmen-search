{% extends "base.html" %}
{% block title %}Ошибка сервера{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container">
        <div class="error-page-content">
            <div class="error-code">500</div>
            <div class="error-illustration">
                <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="error-svg">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <h1 class="error-title">Ошибка сервера</h1>
            <p class="error-desc">Что-то пошло не так. Мы уже работаем над исправлением. Попробуйте обновить страницу.</p>
            <div class="error-actions">
                <button onclick="window.location.reload()" class="btn btn-primary btn-lg">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Обновить страницу
                </button>
                <a href="/" class="btn btn-ghost btn-lg">На главную</a>
            </div>
        </div>
    </div>
</div>

<style>
.error-page {
    min-height: calc(100vh - var(--header-height));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 0;
    background: var(--bg-secondary);
}
.error-page-content {
    text-align: center;
    max-width: 480px;
    margin: 0 auto;
}
.error-code {
    font-size: 120px;
    font-weight: 900;
    color: var(--danger);
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -4px;
    opacity: 0.15;
}
.error-illustration { margin: -40px auto 24px; }
.error-svg { color: var(--danger); opacity: 0.6; margin: 0 auto; }
.error-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 12px;
}
.error-desc {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.6;
}
.error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}
</style>
{% endblock %}
