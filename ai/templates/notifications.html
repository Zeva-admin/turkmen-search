{% extends "base.html" %}
{% block title %}Уведомления{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="container">
        <div class="notifications-page-layout">
            <div class="notifications-page-header">
                <h1 class="page-title">Уведомления</h1>
                <div class="notif-header-actions">
                    <button class="btn btn-ghost btn-sm" id="markAllReadPageBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                        Отметить все прочитанными
                    </button>
                    <button class="btn btn-ghost btn-sm" id="clearAllBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        Очистить
                    </button>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="notif-tabs">
                <button class="notif-tab active" data-filter="all">Все</button>
                <button class="notif-tab" data-filter="unread">Непрочитанные</button>
                <button class="notif-tab" data-filter="application">Отклики</button>
                <button class="notif-tab" data-filter="message">Сообщения</button>
                <button class="notif-tab" data-filter="system">Системные</button>
            </div>

            <!-- Notifications List -->
            <div class="notifications-page-list" id="notificationsPageList">
                <div class="loading-state">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="notifPagination"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentFilter = 'all';
let currentPage = 1;
let notifications = [];

document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.isLoggedIn()) {
        window.location.href = '/login?redirect=/notifications';
        return;
    }

    await loadNotificationsPage();
    setupTabs();
    setupActions();
});

async function loadNotificationsPage() {
    const list = document.getElementById('notificationsPageList');
    list.innerHTML = `<div class="loading-state"><div class="spinner"></div></div>`;

    try {
        let url = `/api/messages/notifications?page=${currentPage}`;
        if (currentFilter !== 'all' && currentFilter !== 'unread') {
            url += `&type=${currentFilter}`;
        }
        if (currentFilter === 'unread') {
            url += `&unread=true`;
        }

        const data = await API.get('/api/auth/notifications', true);
        notifications = data.notifications || [];

        renderNotificationsPage(notifications);
    } catch(e) {
        loadFromPanel();
    }
}

async function loadFromPanel() {
    const list = document.getElementById('notificationsPageList');
    try {
        const token = Auth.getToken();
        const res = await fetch('/api/auth/notifications', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        notifications = data.notifications || [];
        renderNotificationsPage(notifications);
    } catch(e) {
        list.innerHTML = `<div class="empty-state">
            <p>Уведомлений пока нет</p>
        </div>`;
    }
}

function renderNotificationsPage(notifs) {
    const list = document.getElementById('notificationsPageList');
    let filtered = notifs;

    if (currentFilter === 'unread') {
        filtered = notifs.filter(n => !n.is_read);
    } else if (currentFilter !== 'all') {
        filtered = notifs.filter(n => n.type === currentFilter);
    }

    if (!filtered || filtered.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <h3>Уведомлений нет</h3>
                <p>Здесь будут появляться уведомления об откликах, сообщениях и других событиях</p>
            </div>`;
        return;
    }

    const typeIcons = {
        info: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        application: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
        message: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
        invitation: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
        system: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>`,
    };

    const typeColors = {
        info: 'notif-info',
        application: 'notif-application',
        message: 'notif-message',
        invitation: 'notif-invitation',
        system: 'notif-system',
    };

    list.innerHTML = filtered.map(notif => `
        <div class="notification-page-item ${notif.is_read ? '' : 'unread'}" data-id="${notif.id}">
            <div class="notif-page-icon ${typeColors[notif.type] || 'notif-info'}">
                ${typeIcons[notif.type] || typeIcons.info}
            </div>
            <div class="notif-page-content">
                <div class="notif-page-header-row">
                    <h4 class="notif-page-title">${notif.title}</h4>
                    <span class="notif-page-time">${formatDate(notif.created_at)}</span>
                </div>
                <p class="notif-page-text">${notif.text}</p>
                ${notif.link ? `<a href="${notif.link}" class="notif-page-link">${notif.link_text || 'Перейти'} →</a>` : ''}
            </div>
            <div class="notif-page-actions">
                ${!notif.is_read ? `<button class="btn-icon mark-read-btn" onclick="markRead(${notif.id})" title="Отметить прочитанным">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </button>` : ''}
            </div>
        </div>
    `).join('');
}

function setupTabs() {
    document.querySelectorAll('.notif-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.notif-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            renderNotificationsPage(notifications);
        });
    });
}

function setupActions() {
    document.getElementById('markAllReadPageBtn').addEventListener('click', async () => {
        try {
            await API.post('/api/auth/notifications/read-all', {}, true);
            notifications.forEach(n => n.is_read = true);
            renderNotificationsPage(notifications);
            showToast('Все уведомления отмечены прочитанными', 'success');
        } catch(e) {
            showToast('Ошибка', 'error');
        }
    });
}

async function markRead(id) {
    try {
        await API.put(`/api/auth/notifications/${id}/read`, {}, true);
        const notif = notifications.find(n => n.id === id);
        if (notif) notif.is_read = true;
        renderNotificationsPage(notifications);
    } catch(e) {}
}
</script>
{% endblock %}
