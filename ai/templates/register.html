{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-wrapper">
            <div class="auth-card auth-card-wide">
                <div class="auth-header">
                    <a href="/" class="auth-logo">
                        <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                            <rect width="32" height="32" rx="8" fill="#2563EB"/>
                            <path d="M8 22L13 10L16 18L19 13L24 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="24" cy="10" r="2.5" fill="#60A5FA"/>
                        </svg>
                        <span class="logo-text">Turkmen<span class="logo-accent">Search</span></span>
                    </a>
                    <h1 class="auth-title">Создайте аккаунт</h1>
                    <p class="auth-subtitle">Это займёт менее минуты</p>
                </div>

                <!-- Role Selector -->
                <div class="role-selector" id="roleSelector">
                    <button type="button" class="role-btn active" data-role="jobseeker" id="roleJobseeker">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <span>Ищу работу</span>
                    </button>
                    <button type="button" class="role-btn" data-role="employer" id="roleEmployer">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        <span>Ищу сотрудника</span>
                    </button>
                </div>

                <form class="auth-form" id="registerForm" novalidate>
                    <input type="hidden" id="selectedRole" value="jobseeker">

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="regName">Полное имя</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <input type="text" class="form-input" id="regName" placeholder="Иван Иванов" required autocomplete="name">
                            </div>
                            <span class="form-error" id="nameError"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="regEmail">Email адрес</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                <input type="email" class="form-input" id="regEmail" placeholder="example@mail.com" required autocomplete="email">
                            </div>
                            <span class="form-error" id="regEmailError"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="regPassword">Пароль</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                <input type="password" class="form-input" id="regPassword" placeholder="Минимум 6 символов" required autocomplete="new-password">
                                <button type="button" class="input-toggle-pw" id="toggleRegPassword">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <span class="form-error" id="regPasswordError"></span>
                            <div class="password-strength" id="passwordStrength">
                                <div class="strength-bar">
                                    <div class="strength-fill" id="strengthFill"></div>
                                </div>
                                <span class="strength-text" id="strengthText"></span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="regConfirmPassword">Подтвердите пароль</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                <input type="password" class="form-input" id="regConfirmPassword" placeholder="Повторите пароль" required autocomplete="new-password">
                            </div>
                            <span class="form-error" id="confirmError"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" class="checkbox-input" required>
                            <span class="checkbox-custom"></span>
                            Я согласен с <a href="#" class="auth-link">условиями использования</a> и <a href="#" class="auth-link">политикой конфиденциальности</a>
                        </label>
                        <span class="form-error" id="termsError"></span>
                    </div>

                    <div class="form-alert hidden" id="registerAlert"></div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
                        <span class="btn-text">Создать аккаунт</span>
                        <span class="btn-loader hidden">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Уже есть аккаунт? <a href="/login" class="auth-link">Войдите</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (Auth.isLoggedIn()) {
        window.location.href = '/dashboard';
        return;
    }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('role') === 'employer') {
        selectRole('employer');
    }

    document.querySelectorAll('.role-btn').forEach(btn => {
        btn.addEventListener('click', () => selectRole(btn.dataset.role));
    });

    function selectRole(role) {
        document.getElementById('selectedRole').value = role;
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-role="${role}"]`).classList.add('active');
    }

    document.getElementById('toggleRegPassword').addEventListener('click', () => {
        const input = document.getElementById('regPassword');
        input.type = input.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('regPassword').addEventListener('input', (e) => {
        const val = e.target.value;
        const strength = getPasswordStrength(val);
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        const levels = ['', 'weak', 'medium', 'strong'];
        const labels = ['', 'Слабый', 'Средний', 'Надёжный'];
        fill.className = `strength-fill ${levels[strength]}`;
        fill.style.width = `${(strength / 3) * 100}%`;
        text.textContent = val ? labels[strength] : '';
    });

    function getPasswordStrength(pw) {
        if (pw.length < 6) return 1;
        let s = 0;
        if (pw.length >= 8) s++;
        if (/[A-Z]/.test(pw) || /[а-яА-Я]/.test(pw)) s++;
        if (/[0-9]/.test(pw)) s++;
        if (/[^a-zA-Z0-9]/.test(pw)) s++;
        return Math.min(3, Math.max(1, s));
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        const role = document.getElementById('selectedRole').value;
        const agreed = document.getElementById('agreeTerms').checked;

        let valid = true;

        if (!name || name.length < 2) {
            showFieldError('nameError', 'Имя должно содержать минимум 2 символа');
            valid = false;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showFieldError('regEmailError', 'Введите корректный email');
            valid = false;
        }
        if (!password || password.length < 6) {
            showFieldError('regPasswordError', 'Пароль минимум 6 символов');
            valid = false;
        }
        if (password !== confirmPassword) {
            showFieldError('confirmError', 'Пароли не совпадают');
            valid = false;
        }
        if (!agreed) {
            showFieldError('termsError', 'Необходимо принять условия использования');
            valid = false;
        }

        if (!valid) return;

        setLoading(true);

        try {
            const data = await API.post('/api/auth/register', { name, email, password, role });

            Auth.setToken(data.access_token);
            Auth.setUser(data.user);

            showToast('Аккаунт создан успешно!', 'success');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 800);

        } catch (err) {
            setLoading(false);
            const alert = document.getElementById('registerAlert');
            alert.textContent = err.message || 'Ошибка при регистрации';
            alert.classList.remove('hidden');
        }
    });

    function setLoading(loading) {
        const btn = document.getElementById('registerBtn');
        btn.querySelector('.btn-text').classList.toggle('hidden', loading);
        btn.querySelector('.btn-loader').classList.toggle('hidden', !loading);
        btn.disabled = loading;
    }

    function showFieldError(id, msg) {
        document.getElementById(id).textContent = msg;
    }

    function clearErrors() {
        document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
        document.getElementById('registerAlert').classList.add('hidden');
    }
});
</script>
{% endblock %}
