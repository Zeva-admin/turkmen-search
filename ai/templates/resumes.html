{% extends "base.html" %}
{% block title %}База резюме{% endblock %}
{% block nav_resumes %}active{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">База резюме</h1>
                <p class="page-subtitle" id="resumesCountText">Загрузка...</p>
            </div>
            <div class="page-header-actions auth-only hidden" id="createResumeHeaderBtn">
                <a href="/create-resume" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Создать резюме
                </a>
            </div>
        </div>

        <!-- Filters -->
        <div class="resumes-filter-bar">
            <div class="resumes-search">
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="form-input" id="resumeSearch"
                        placeholder="Должность, навыки, ключевые слова...">
                </div>
            </div>
            <div class="resumes-filters">
                <select class="form-select" id="resumeCity">
                    <option value="">Все города</option>
                    <option value="Ашхабад">Ашхабад</option>
                    <option value="Туркменабат">Туркменабат</option>
                    <option value="Дашогуз">Дашогуз</option>
                    <option value="Мары">Мары</option>
                    <option value="Балканабат">Балканабат</option>
                    <option value="Туркменбаши">Туркменбаши</option>
                </select>
                <select class="form-select" id="resumeEmployment">
                    <option value="">Тип занятости</option>
                    <option value="full_time">Полная занятость</option>
                    <option value="part_time">Частичная</option>
                    <option value="contract">Контракт</option>
                    <option value="remote">Удалённо</option>
                </select>
                <select class="form-select" id="resumeSort">
                    <option value="date">По дате</option>
                    <option value="salary">По зарплате</option>
                </select>
            </div>
        </div>

        <!-- Results -->
        <div class="resumes-list" id="resumesList">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Загрузка резюме...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="resumesPagination"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let isLoading = false;
const filters = { q: '', city: '', employment_type: '', sort: 'date' };

document.addEventListener('DOMContentLoaded', () => {
    // Show create resume btn only for jobseekers
    const user = Auth.getUser();
    if (user && user.role === 'jobseeker') {
        document.getElementById('createResumeHeaderBtn').classList.remove('hidden');
    }

    loadResumes();
    setupListeners();
});

function setupListeners() {
    let timer;
    document.getElementById('resumeSearch').addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            filters.q = e.target.value.trim();
            currentPage = 1;
            loadResumes();
        }, 400);
    });

    document.getElementById('resumeCity').addEventListener('change', (e) => {
        filters.city = e.target.value;
        currentPage = 1;
        loadResumes();
    });

    document.getElementById('resumeEmployment').addEventListener('change', (e) => {
        filters.employment_type = e.target.value;
        currentPage = 1;
        loadResumes();
    });

    document.getElementById('resumeSort').addEventListener('change', (e) => {
        filters.sort = e.target.value;
        currentPage = 1;
        loadResumes();
    });
}

async function loadResumes() {
    if (isLoading) return;
    isLoading = true;

    const list = document.getElementById('resumesList');
    list.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Загрузка...</p></div>`;

    try {
        let url = `/api/resumes?page=${currentPage}&sort=${filters.sort}`;
        if (filters.q) url += `&q=${encodeURIComponent(filters.q)}`;
        if (filters.city) url += `&city=${encodeURIComponent(filters.city)}`;
        if (filters.employment_type) url += `&employment_type=${encodeURIComponent(filters.employment_type)}`;

        const data = await API.get(url);

        document.getElementById('resumesCountText').textContent =
            `Найдено ${data.total} ${pluralize(data.total, 'резюме', 'резюме', 'резюме')}`;

        if (!data.resumes || data.resumes.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <h3>Резюме не найдены</h3>
                    <p>Попробуйте изменить параметры поиска</p>
                </div>`;
            document.getElementById('resumesPagination').innerHTML = '';
            return;
        }

        list.innerHTML = data.resumes.map(r => renderResumeCard(r)).join('');
        renderPagination(data.pages, data.current_page);

    } catch(e) {
        list.innerHTML = `<div class="error-state"><p>Ошибка загрузки. <button class="btn-text" onclick="loadResumes()">Повторить</button></p></div>`;
    } finally {
        isLoading = false;
    }
}

function renderResumeCard(resume) {
    const skillsArr = resume.skills ? JSON.parse(resume.skills) : [];
    const topSkills = skillsArr.slice(0, 4);
    const user = Auth.getUser();
    const isEmployer = user && (user.role === 'employer' || user.role === 'admin');

    return `
        <div class="resume-public-card">
            <div class="resume-public-left">
                <div class="resume-public-avatar">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div class="resume-public-info">
                    <h3 class="resume-public-name">
                        <a href="/resumes/${resume.id}">${resume.full_name}</a>
                    </h3>
                    <p class="resume-public-title">${resume.title}</p>
                    <div class="resume-public-meta">
                        ${resume.city ? `
                        <span class="resume-meta-item">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            ${resume.city}
                        </span>` : ''}
                        ${resume.employment_type ? `<span class="resume-meta-item">${getEmploymentLabel(resume.employment_type)}</span>` : ''}
                        <span class="resume-meta-item">Обновлено: ${formatDate(resume.updated_at)}</span>
                    </div>
                    ${topSkills.length > 0 ? `
                    <div class="resume-skills-row">
                        ${topSkills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                        ${skillsArr.length > 4 ? `<span class="skill-more">+${skillsArr.length - 4}</span>` : ''}
                    </div>` : ''}
                </div>
            </div>
            <div class="resume-public-right">
                <div class="resume-public-salary">${resume.salary}</div>
                <div class="resume-public-actions">
                    <a href="/resumes/${resume.id}" class="btn btn-ghost btn-sm">Просмотр</a>
                    ${isEmployer ? `
                    <a href="/messages?user=${resume.user_id}" class="btn btn-primary btn-sm">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Написать
                    </a>` : ''}
                </div>
            </div>
        </div>`;
}

function getEmploymentLabel(type) {
    const labels = {
        full_time: 'Полная занятость',
        part_time: 'Частичная',
        contract: 'Контракт',
        internship: 'Стажировка',
        remote: 'Удалённо',
    };
    return labels[type] || type;
}

function renderPagination(totalPages, page) {
    const pag = document.getElementById('resumesPagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = '';
    if (page > 1) html += `<button class="page-btn" onclick="goToPage(${page-1})">← Назад</button>`;
    for (let i = Math.max(1, page-2); i <= Math.min(totalPages, page+2); i++) {
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    if (page < totalPages) html += `<button class="page-btn" onclick="goToPage(${page+1})">Вперёд →</button>`;
    pag.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    loadResumes();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

<style>
.resumes-filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}
.resumes-search { flex: 1; min-width: 200px; }
.resumes-search .input-wrapper .form-input { padding-left: 36px; }
.resumes-filters { display: flex; gap: 10px; flex-wrap: wrap; }
.resumes-filters .form-select { min-width: 160px; }

.resume-public-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 10px;
    transition: all var(--transition-md);
}
.resume-public-card:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow-md);
}
.resume-public-left { display: flex; gap: 16px; align-items: flex-start; flex: 1; min-width: 0; }
.resume-public-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    flex-shrink: 0;
}
.resume-public-info { flex: 1; min-width: 0; }
.resume-public-name { margin-bottom: 4px; }
.resume-public-name a {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    text-decoration: none;
    transition: color var(--transition);
}
.resume-public-name a:hover { color: var(--primary); }
.resume-public-title { font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; }
.resume-public-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 8px;
}
.resume-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-tertiary);
}
.resume-skills-row { display: flex; gap: 6px; flex-wrap: wrap; }
.skill-more {
    padding: 3px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-full);
    font-size: 12px;
    color: var(--text-tertiary);
}
.resume-public-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
}
.resume-public-salary {
    font-size: 16px;
    font-weight: 700;
    color: var(--success);
    white-space: nowrap;
}
.resume-public-actions { display: flex; gap: 8px; }

@media (max-width: 640px) {
    .resume-public-card { flex-direction: column; align-items: flex-start; }
    .resume-public-right { width: 100%; flex-direction: row; justify-content: space-between; align-items: center; }
}
</style>
{% endblock %}
