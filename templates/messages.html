{% extends "base.html" %}
{% block title %}Сообщения{% endblock %}

{% block content %}
<div class="messages-page">
    <div class="container">
        <div class="messages-layout">

            <!-- Conversations List -->
            <div class="conversations-panel" id="conversationsPanel">
                <div class="conversations-header">
                    <h2 class="conversations-title">Сообщения</h2>
                    <span class="unread-total hidden" id="unreadTotal"></span>
                </div>
                <div class="conversations-search">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" class="form-input" id="conversationSearch" placeholder="Поиск...">
                    </div>
                </div>
                <div class="conversations-list" id="conversationsList">
                    <div class="loading-state">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <div class="chat-empty-state" id="chatEmptyState">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <h3>Выберите диалог</h3>
                    <p>Или начните новый разговор</p>
                </div>

                <!-- Chat Header -->
                <div class="chat-header hidden" id="chatHeader">
                    <button class="btn-icon mobile-back-btn" id="mobileBackBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <div class="chat-header-user">
                        <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                        <div class="chat-header-info">
                            <span class="chat-header-name" id="chatHeaderName"></span>
                            <span class="chat-header-role" id="chatHeaderRole"></span>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="btn-icon" onclick="goToUserProfile()" title="Профиль">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="messages-container hidden" id="messagesContainer">
                    <div class="messages-list" id="messagesList"></div>
                </div>

                <!-- Message Input -->
                <div class="message-input-area hidden" id="messageInputArea">
                    <div class="message-input-wrapper">
                        <textarea
                            class="message-textarea"
                            id="messageInput"
                            placeholder="Написать сообщение..."
                            rows="1"
                            maxlength="5000"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentUserId = null;
let currentConversationUserId = null;
let currentOtherUser = null;
let pollInterval = null;
let allConversations = [];

document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.isLoggedIn()) {
        window.location.href = '/login?redirect=/messages';
        return;
    }

    try {
        const userData = await API.get('/api/auth/me', true);
        currentUserId = userData.user.id;
    } catch(e) {
        Auth.logout();
        window.location.href = '/login';
        return;
    }

    await loadConversations();
    setupMessageInput();
    setupSearch();

    // Check URL params for direct message
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user');
    if (userId) {
        openConversation(parseInt(userId));
    }
});

async function loadConversations() {
    try {
        const data = await API.get('/api/messages/conversations', true);
        allConversations = data.conversations || [];
        renderConversations(allConversations);

        const totalUnread = allConversations.reduce((sum, c) => sum + (c.unread_count || 0), 0);
        if (totalUnread > 0) {
            const badge = document.getElementById('unreadTotal');
            badge.textContent = totalUnread;
            badge.classList.remove('hidden');
        }
    } catch(e) {
        document.getElementById('conversationsList').innerHTML =
            '<p class="error-text">Ошибка загрузки</p>';
    }
}

function renderConversations(conversations) {
    const list = document.getElementById('conversationsList');

    if (!conversations || conversations.length === 0) {
        list.innerHTML = `
            <div class="conversations-empty">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <p>Нет диалогов</p>
            </div>`;
        return;
    }

    list.innerHTML = conversations.map(conv => {
        const other = conv.other_user;
        if (!other) return '';
        const initials = other.name.split(' ').map(n => n[0]).join('').substring(0, 2);
        const isActive = currentConversationUserId === other.id;
        const timeAgo = conv.last_message_at ? formatTimeAgo(conv.last_message_at) : '';

        return `
            <div class="conversation-item ${isActive ? 'active' : ''} ${conv.unread_count > 0 ? 'unread' : ''}"
                 onclick="openConversation(${other.id})"
                 data-user-id="${other.id}">
                <div class="conv-avatar">
                    ${other.avatar
                        ? `<img src="/uploads/avatars/${other.avatar}" alt="${other.name}">`
                        : `<div class="avatar-initials">${initials}</div>`}
                </div>
                <div class="conv-info">
                    <div class="conv-info-top">
                        <span class="conv-name">${other.name}</span>
                        <span class="conv-time">${timeAgo}</span>
                    </div>
                    <div class="conv-info-bottom">
                        <span class="conv-last-msg">${conv.last_message || 'Начните диалог'}</span>
                        ${conv.unread_count > 0
                            ? `<span class="conv-unread-badge">${conv.unread_count}</span>`
                            : ''}
                    </div>
                </div>
            </div>`;
    }).join('');
}

async function openConversation(userId) {
    currentConversationUserId = userId;

    // Update active state
    document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.toggle('active', parseInt(item.dataset.userId) === userId);
    });

    // Show chat UI
    document.getElementById('chatEmptyState').classList.add('hidden');
    document.getElementById('chatHeader').classList.remove('hidden');
    document.getElementById('messagesContainer').classList.remove('hidden');
    document.getElementById('messageInputArea').classList.remove('hidden');

    // Mobile
    document.getElementById('conversationsPanel').classList.add('mobile-hidden');
    document.getElementById('chatArea').classList.add('mobile-visible');

    // Load messages
    await loadMessages(userId);

    // Start polling
    clearInterval(pollInterval);
    pollInterval = setInterval(() => {
        loadMessages(userId, true);
    }, 3000);

    // Focus input
    document.getElementById('messageInput').focus();
}

async function loadMessages(userId, silent = false) {
    const list = document.getElementById('messagesList');

    if (!silent) {
        list.innerHTML = `<div class="loading-state"><div class="spinner"></div></div>`;
    }

    try {
        const data = await API.get(`/api/messages/conversation/${userId}`, true);
        currentOtherUser = data.other_user;

        // Update header
        const other = data.other_user;
        const initials = other.name.split(' ').map(n => n[0]).join('').substring(0, 2);
        document.getElementById('chatHeaderAvatar').innerHTML = other.avatar
            ? `<img src="/uploads/avatars/${other.avatar}" alt="${other.name}">`
            : `<div class="avatar-initials">${initials}</div>`;
        document.getElementById('chatHeaderName').textContent = other.name;
        document.getElementById('chatHeaderRole').textContent =
            other.role === 'employer' ? 'Работодатель' : 'Соискатель';

        const wasAtBottom = isScrolledToBottom(list);

        if (data.messages && data.messages.length > 0) {
            list.innerHTML = data.messages.map(msg => renderMessage(msg)).join('');
        } else {
            list.innerHTML = `<div class="messages-empty">
                <p>Начните переписку с ${other.name}</p>
            </div>`;
        }

        if (!silent || wasAtBottom) {
            scrollToBottom(list);
        }

        // Refresh conversations to update unread
        if (!silent) await loadConversations();

    } catch(e) {
        if (!silent) {
            list.innerHTML = '<p class="error-text">Ошибка загрузки сообщений</p>';
        }
    }
}

function renderMessage(msg) {
    const isMine = msg.is_mine;
    const time = msg.created_at ? formatTime(msg.created_at) : '';

    return `
        <div class="message-bubble-wrap ${isMine ? 'mine' : 'theirs'}">
            <div class="message-bubble">
                <p class="message-text">${escapeHtml(msg.text)}</p>
                <div class="message-meta">
                    <span class="message-time">${time}</span>
                    ${isMine ? `<span class="message-status ${msg.is_read ? 'read' : ''}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            ${msg.is_read
                                ? '<polyline points="20 6 9 17 4 12"/><polyline points="20 6 9 17 4 12" transform="translate(3,0)"/>'
                                : '<polyline points="20 6 9 17 4 12"/>'}
                        </svg>
                    </span>` : ''}
                </div>
            </div>
        </div>`;
}

function setupMessageInput() {
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('input', () => {
        sendBtn.disabled = !input.value.trim();
        // Auto resize
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!sendBtn.disabled) sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    document.getElementById('mobileBackBtn').addEventListener('click', () => {
        document.getElementById('conversationsPanel').classList.remove('mobile-hidden');
        document.getElementById('chatArea').classList.remove('mobile-visible');
        clearInterval(pollInterval);
    });
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !currentConversationUserId) return;

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    try {
        await API.post('/api/messages/send', {
            receiver_id: currentConversationUserId,
            text: text,
        }, true);

        await loadMessages(currentConversationUserId, true);
        await loadConversations();

    } catch(e) {
        showToast(e.message || 'Ошибка отправки', 'error');
        input.value = text;
        sendBtn.disabled = false;
    }
}

function setupSearch() {
    let timer;
    document.getElementById('conversationSearch').addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            const q = e.target.value.toLowerCase().trim();
            if (!q) {
                renderConversations(allConversations);
                return;
            }
            const filtered = allConversations.filter(c =>
                c.other_user?.name.toLowerCase().includes(q)
            );
            renderConversations(filtered);
        }, 300);
    });
}

function isScrolledToBottom(el) {
    return el.scrollHeight - el.scrollTop - el.clientHeight < 50;
}

function scrollToBottom(el) {
    el.scrollTop = el.scrollHeight;
}

function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function formatTimeAgo(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return 'только что';
    if (diff < 3600) return `${Math.floor(diff/60)} мин`;
    if (diff < 86400) return `${Math.floor(diff/3600)} ч`;
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

function goToUserProfile() {
    if (currentOtherUser) {
        window.location.href = `/profile?id=${currentOtherUser.id}`;
    }
}

window.addEventListener('beforeunload', () => {
    clearInterval(pollInterval);
});
</script>
{% endblock %}
