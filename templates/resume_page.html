{% extends "base.html" %}
{% block title %}Резюме{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Главная</a>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <a href="/resumes">Резюме</a>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span id="breadcrumbResume">Загрузка...</span>
        </div>

        <div id="resumePageContent">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Загрузка резюме...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const RESUME_ID = {{ resume_id }};

document.addEventListener('DOMContentLoaded', () => {
    loadResumePage();
});

async function loadResumePage() {
    try {
        const data = await API.get(`/api/resumes/${RESUME_ID}`);
        renderResumePage(data.resume);
    } catch(e) {
        document.getElementById('resumePageContent').innerHTML = `
            <div class="error-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <h3>Резюме не найдено</h3>
                <p>Возможно, оно было удалено или скрыто</p>
                <a href="/resumes" class="btn btn-primary">Все резюме</a>
            </div>`;
    }
}

function renderResumePage(resume) {
    document.title = `${resume.full_name} — ${resume.title} — Turkmen Search`;
    document.getElementById('breadcrumbResume').textContent = resume.full_name;

    const skillsArr = resume.skills ? JSON.parse(resume.skills) : [];
    const currentUser = Auth.getUser();
    const isOwner = currentUser && currentUser.id === resume.user_id;
    const isEmployer = currentUser && (currentUser.role === 'employer' || currentUser.role === 'admin');

    const content = document.getElementById('resumePageContent');
    content.innerHTML = `
        <div class="resume-page-layout">
            <div class="resume-page-main">
                <!-- Header Card -->
                <div class="resume-header-card">
                    <div class="resume-header-top">
                        <div class="resume-avatar-lg">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div class="resume-header-info">
                            <h1 class="resume-full-name">${resume.full_name}</h1>
                            <p class="resume-position-title">${resume.title}</p>
                            <div class="resume-header-meta">
                                ${resume.city ? `
                                <span class="resume-meta-chip">
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                    ${resume.city}
                                </span>` : ''}
                                ${resume.desired_salary ? `
                                <span class="resume-meta-chip salary-chip">${resume.salary}</span>` : ''}
                                ${resume.employment_type ? `
                                <span class="resume-meta-chip">${getEmploymentLabel(resume.employment_type)}</span>` : ''}
                                ${resume.relocation ? '<span class="resume-meta-chip">Готов к переезду</span>' : ''}
                                ${resume.business_trip ? '<span class="resume-meta-chip">Командировки</span>' : ''}
                            </div>
                        </div>
                        <div class="resume-header-actions">
                            ${isOwner ? `
                            <a href="/create-resume?edit=${resume.id}" class="btn btn-primary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                Редактировать
                            </a>` : ''}
                            ${isEmployer && !isOwner ? `
                            <a href="/messages?user=${resume.user_id}" class="btn btn-primary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                Написать
                            </a>
                            <button class="btn btn-ghost" onclick="inviteCandidate(${resume.user_id})">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                                Пригласить
                            </button>` : ''}
                        </div>
                    </div>
                    <div class="resume-view-stats">
                        <span class="resume-stat">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            ${resume.views_count} просмотров
                        </span>
                        <span class="resume-stat">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Обновлено: ${formatDate(resume.updated_at)}
                        </span>
                    </div>
                </div>

                <!-- About -->
                ${resume.about ? `
                <div class="resume-section-card">
                    <h2 class="resume-section-title">О себе</h2>
                    <p class="resume-about-text">${resume.about}</p>
                </div>` : ''}

                <!-- Experience -->
                ${resume.experiences && resume.experiences.length > 0 ? `
                <div class="resume-section-card">
                    <h2 class="resume-section-title">Опыт работы</h2>
                    <div class="experience-timeline">
                        ${resume.experiences.map(exp => `
                        <div class="exp-timeline-item">
                            <div class="exp-timeline-dot"></div>
                            <div class="exp-timeline-content">
                                <div class="exp-timeline-header">
                                    <h3 class="exp-position">${exp.position}</h3>
                                    <span class="exp-dates">${formatExpDate(exp.start_date)} — ${exp.is_current ? 'По настоящее время' : formatExpDate(exp.end_date)}</span>
                                </div>
                                <div class="exp-company-name">${exp.company_name}${exp.city ? ` · ${exp.city}` : ''}</div>
                                ${exp.description ? `<p class="exp-description">${exp.description}</p>` : ''}
                            </div>
                        </div>`).join('')}
                    </div>
                </div>` : ''}

                <!-- Education -->
                ${resume.educations && resume.educations.length > 0 ? `
                <div class="resume-section-card">
                    <h2 class="resume-section-title">Образование</h2>
                    <div class="education-list">
                        ${resume.educations.map(edu => `
                        <div class="edu-item">
                            <div class="edu-item-header">
                                <div>
                                    <h3 class="edu-institution">${edu.institution}</h3>
                                    ${edu.faculty ? `<p class="edu-faculty">${edu.faculty}</p>` : ''}
                                    ${edu.specialty ? `<p class="edu-specialty">${edu.specialty}</p>` : ''}
                                </div>
                                <div class="edu-meta">
                                    ${edu.degree ? `<span class="edu-degree">${edu.degree}</span>` : ''}
                                    <span class="edu-years">${edu.start_year || ''} — ${edu.is_current ? 'по н.в.' : (edu.end_year || '')}</span>
                                </div>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>` : ''}

                <!-- Skills -->
                ${skillsArr.length > 0 ? `
                <div class="resume-section-card">
                    <h2 class="resume-section-title">Ключевые навыки</h2>
                    <div class="skills-list">
                        ${skillsArr.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                    </div>
                </div>` : ''}

                <!-- Languages -->
                ${resume.languages && resume.languages.length > 0 ? `
                <div class="resume-section-card">
                    <h2 class="resume-section-title">Знание языков</h2>
                    <div class="languages-list">
                        ${resume.languages.map(lang => `
                        <div class="lang-item">
                            <span class="lang-name">${lang.name}</span>
                            <span class="lang-level-badge">${lang.level_display}</span>
                        </div>`).join('')}
                    </div>
                </div>` : ''}
            </div>

            <!-- Sidebar -->
            <aside class="resume-page-sidebar">
                <div class="sidebar-card">
                    <h3 class="sidebar-card-title">Контакты</h3>
                    ${!Auth.isLoggedIn() ? `
                    <p style="font-size:13px;color:var(--text-secondary);">
                        <a href="/login" class="auth-link">Войдите</a>, чтобы увидеть контакты
                    </p>` : `
                    <div class="contact-list">
                        ${resume.phone ? `
                        <div class="contact-item">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.64 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 17z"/></svg>
                            <a href="tel:${resume.phone}">${resume.phone}</a>
                        </div>` : ''}
                        ${resume.email ? `
                        <div class="contact-item">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <a href="mailto:${resume.email}">${resume.email}</a>
                        </div>` : ''}
                        ${isEmployer && !isOwner ? `
                        <a href="/messages?user=${resume.user_id}" class="btn btn-primary btn-full" style="margin-top:8px;">
                            Написать сообщение
                        </a>` : ''}
                    </div>`}
                </div>

                ${resume.desired_salary ? `
                <div class="sidebar-card">
                    <h3 class="sidebar-card-title">Желаемая зарплата</h3>
                    <div class="salary-highlight">${resume.salary}</div>
                </div>` : ''}

                <div class="sidebar-card">
                    <h3 class="sidebar-card-title">Предпочтения</h3>
                    <div class="preferences-list">
                        ${resume.employment_type ? `
                        <div class="pref-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                            ${getEmploymentLabel(resume.employment_type)}
                        </div>` : ''}
                        ${resume.city ? `
                        <div class="pref-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            ${resume.city}
                        </div>` : ''}
                        ${resume.relocation ? `
                        <div class="pref-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            Готов к переезду
                        </div>` : ''}
                        ${resume.business_trip ? `
                        <div class="pref-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                            Готов к командировкам
                        </div>` : ''}
                    </div>
                </div>
            </aside>
        </div>`;
}

function formatExpDate(dateStr) {
    if (!dateStr) return '';
    try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
    } catch(e) { return dateStr; }
}

function getEmploymentLabel(type) {
    const labels = {
        full_time: 'Полная занятость',
        part_time: 'Частичная занятость',
        contract: 'Контракт',
        internship: 'Стажировка',
        remote: 'Удалённо',
    };
    return labels[type] || type;
}

async function inviteCandidate(userId) {
    window.location.href = `/messages?user=${userId}`;
}
</script>

<style>
.resume-page-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
    align-items: start;
}

.resume-header-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 16px;
}

.resume-header-top {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.resume-avatar-lg {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    flex-shrink: 0;
    border: 2px solid var(--border);
}

.resume-header-info { flex: 1; min-width: 200px; }

.resume-full-name {
    font-size: 26px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
}

.resume-position-title {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    font-weight: 500;
}

.resume-header-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.resume-meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-full);
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
}

.salary-chip {
    background: var(--success-light);
    border-color: #bbf7d0;
    color: var(--success);
    font-weight: 700;
}

[data-theme="dark"] .salary-chip {
    background: #052e16;
    border-color: #166534;
}

.resume-header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
}

.resume-view-stats {
    display: flex;
    gap: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--border-light);
}

.resume-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-tertiary);
}

.resume-section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 16px;
}

.resume-section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-light);
}

.resume-about-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-secondary);
}

/* Experience Timeline */
.experience-timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
}

.exp-timeline-item {
    display: flex;
    gap: 16px;
    position: relative;
    padding-bottom: 24px;
}

.exp-timeline-item:last-child { padding-bottom: 0; }

.exp-timeline-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--primary);
    border: 3px solid var(--primary-light);
    flex-shrink: 0;
    margin-top: 4px;
    position: relative;
    z-index: 1;
}

.exp-timeline-item:not(:last-child) .exp-timeline-dot::after {
    content: '';
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: var(--border);
    height: calc(100% + 20px);
}

.exp-timeline-content { flex: 1; }

.exp-timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 4px;
    flex-wrap: wrap;
}

.exp-position {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
}

.exp-dates {
    font-size: 12px;
    color: var(--text-tertiary);
    white-space: nowrap;
}

.exp-company-name {
    font-size: 14px;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 6px;
}

.exp-description {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
}

/* Education */
.education-list { display: flex; flex-direction: column; gap: 16px; }

.edu-item {
    padding: 16px;
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
}

.edu-item-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
}

.edu-institution {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 3px;
}

.edu-faculty, .edu-specialty {
    font-size: 13px;
    color: var(--text-secondary);
}

.edu-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
}

.edu-degree {
    display: inline-block;
    padding: 3px 10px;
    background: var(--primary-light);
    border-radius: var(--radius-full);
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
}

.edu-years { font-size: 12px; color: var(--text-tertiary); }

/* Languages */
.languages-list { display: flex; flex-direction: column; gap: 10px; }

.lang-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
}

.lang-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }

.lang-level-badge {
    padding: 3px 10px;
    background: var(--primary-light);
    border-radius: var(--radius-full);
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
}

/* Sidebar */
.resume-page-sidebar { position: sticky; top: calc(var(--header-height) + 16px); }

.contact-list { display: flex; flex-direction: column; gap: 10px; }

.contact-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
}

.contact-item svg { color: var(--text-tertiary); flex-shrink: 0; }
.contact-item a { color: var(--primary); text-decoration: none; font-weight: 500; }

.salary-highlight {
    font-size: 22px;
    font-weight: 800;
    color: var(--success);
}

.preferences-list { display: flex; flex-direction: column; gap: 10px; }

.pref-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
}

.pref-item svg { color: var(--primary); flex-shrink: 0; }

@media (max-width: 768px) {
    .resume-page-layout { grid-template-columns: 1fr; }
    .resume-page-sidebar { display: none; }
    .resume-header-top { flex-direction: column; }
    .resume-full-name { font-size: 20px; }
}
</style>
{% endblock %}
